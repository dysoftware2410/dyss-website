    <polygon points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20" fill="rgba(20,255,200,0.04)"/>
    <polygon points="0,-20 17,-10 17,10 0,20 -17,10 -17,-10" stroke-width="1.2" opacity="0.85"/>
    <line x1="0" y1="-40" x2="0" y2="-20"/>
    <line x1="35" y1="-20" x2="17" y2="-10"/>
